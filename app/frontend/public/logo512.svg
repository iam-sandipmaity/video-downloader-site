<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="url(#gradient512)"/>
  
  <!-- Download Icon -->
  <g transform="translate(128, 128)">
    <!-- Arrow shaft -->
    <path d="M 128 32 L 128 160" stroke="white" stroke-width="32" stroke-linecap="round"/>
    <!-- Arrow head left -->
    <path d="M 128 160 L 80 112" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow head right -->
    <path d="M 128 160 L 176 112" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Download tray -->
