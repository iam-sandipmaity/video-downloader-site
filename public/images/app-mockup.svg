<svg width="448" height="896" viewBox="0 0 448 896" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone Frame -->
  <rect x="24" y="24" width="400" height="848" rx="60" fill="#0F172A" stroke="#1E293B" stroke-width="8"/>
  
  <!-- Screen Notch -->
  <path d="M 160 24 Q 160 48, 184 48 L 264 48 Q 288 48, 288 24" fill="#0F172A"/>
  <rect x="184" y="32" width="80" height="24" rx="12" fill="#1E293B"/>
  
  <!-- Screen Content Background -->
  <rect x="48" y="88" width="352" height="760" rx="32" fill="#0A0E1A"/>
  
  <!-- Header Section -->
  <g id="header">
    <!-- Title -->
    <text x="90" y="140" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF">
      Downloader
    </text>
    
    <!-- Menu Icon -->
    <g transform="translate(345, 116)">
      <circle cx="16" cy="16" r="20" fill="#1E293B"/>
      <line x1="10" y1="10" x2="22" y2="10" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="16" x2="22" y2="16" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="22" x2="22" y2="22" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Input Card -->
  <g id="input-card">
    <!-- Card Background -->
    <rect x="88" y="190" width="272" height="144" rx="24" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    
    <!-- Input Field -->
    <rect x="108" y="218" width="232" height="48" rx="12" fill="#0F172A"/>
    <text x="124" y="248" font-family="Arial, sans-serif" font-size="16" fill="#64748B">
      Paste video URL here...
    </text>
    
    <!-- Download Button -->
    <rect x="108" y="282" width="232" height="40" rx="12" fill="url(#buttonGradient)"/>
    <text x="224" y="308" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF" text-anchor="middle">
      Download
    </text>
  </g>
  
  <!-- Recent Downloads Section -->
  <g id="recent-section">
    <!-- Section Title -->
    <text x="88" y="380" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#64748B">
      Recent Downloads
    </text>
    
    <!-- Download Item 1 -->
    <g id="item-1">
      <rect x="88" y="410" width="272" height="88" rx="20" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <!-- Play Icon -->
      <circle cx="126" cy="454" r="24" fill="#334155"/>
      <path d="M 122 444 L 122 464 L 134 454 Z" fill="#64748B"/>
      <!-- Progress Bars -->
      <rect x="168" y="434" width="168" height="8" rx="4" fill="#334155"/>
      <rect x="168" y="434" width="120" height="8" rx="4" fill="#475569"/>
      <rect x="168" y="454" width="120" height="6" rx="3" fill="#334155"/>
    </g>
    
    <!-- Download Item 2 -->
    <g id="item-2">
      <rect x="88" y="514" width="272" height="88" rx="20" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <!-- Play Icon -->
      <circle cx="126" cy="558" r="24" fill="#334155"/>
      <path d="M 122 548 L 122 568 L 134 558 Z" fill="#64748B"/>
      <!-- Progress Bars -->
      <rect x="168" y="538" width="168" height="8" rx="4" fill="#334155"/>
      <rect x="168" y="538" width="100" height="8" rx="4" fill="#475569"/>
      <rect x="168" y="558" width="100" height="6" rx="3" fill="#334155"/>
    </g>
    
    <!-- Download Item 3 -->
    <g id="item-3">
      <rect x="88" y="618" width="272" height="88" rx="20" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <!-- Play Icon -->
      <circle cx="126" cy="662" r="24" fill="#334155"/>
      <path d="M 122 652 L 122 672 L 134 662 Z" fill="#64748B"/>
      <!-- Progress Bars -->
      <rect x="168" y="642" width="168" height="8" rx="4" fill="#334155"/>
      <rect x="168" y="642" width="140" height="8" rx="4" fill="#475569"/>
      <rect x="168" y="662" width="140" height="6" rx="3" fill="#334155"/>
    </g>
  </g>
  
  <!-- Gradients and Definitions -->
  <defs>
    <linearGradient id="buttonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Home Indicator -->
  <rect x="184" y="840" width="80" height="4" rx="2" fill="#334155"/>
</svg>
